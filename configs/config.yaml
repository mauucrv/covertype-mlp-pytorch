# Configuración para Entrenamiento y Evaluación del Perceptron Multicapa (MLP)

# Hiperparámetros de los datos
data:
  batch_size: 256
  test_size: 0.15
  val_size: 0.176
  random_state: 42

# Arquitectura del modelo sugerida por Optuna (Modelo Final Optimizado)
model:
  hidden_sizes: [512, 480, 400, 360]
  dropout_rate: 0.127

# Configuración del entrenamiento
training:
  epochs: 100
  learning_rate: 0.00031
  patience: 15
  scheduler_factor: 0.5
  scheduler_patience: 7

# Configuracion de búsqueda de hiperparámetros
optuna:
  n_trials: 30
  n_epochs: 20
  hidden_layers_range: [2, 5]
  first_layer_range: [256, 512]
  dropout_range: [0.1, 0.5]
  lr_range: [1.0e-4, 1.0e-2]

# Rutas de almacenamiento
paths:
  models_dir: "models"
  best_model_name: "covertype_mlp_final.pth"
  tensorboard_dir: "runs"
